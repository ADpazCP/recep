<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Visitantes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    :root {
        --cor-laranja: #f97316;
        --cor-cinza-claro: #f1f5f9;
        --cor-texto: #334155;
    }

    body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; color: var(--cor-texto); }
    
    .container-app { max-width: 480px; margin: 20px auto; padding: 0 15px; }

    /* Logo */
    .logo-header { text-align: center; margin-bottom: 15px; }
    .logo-header img { width: 150px; height: 40px; object-fit: contain; }

    /* Compactação */
    .visitor-card {
        background: #fff;
        padding: 12px 15px; /* Espaçamento interno reduzido */
        margin-bottom: 8px; /* Distância entre cards reduzida */
        border-radius: 10px;
        border-left: 5px solid var(--cor-laranja); /* Toque laranja */
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        cursor: pointer;
    }

    .card-nome { font-size: 1.1rem; font-weight: 700; line-height: 1.2; }
    
    .form-control, .form-select {
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 0.95rem;
    }

    .info-box {
        background: var(--cor-cinza-claro);
        padding: 8px 12px;
        border-radius: 8px;
        margin-bottom: 6px;
        font-size: 0.9rem;
    }

    .btn-dark { background: var(--cor-laranja); border: none; border-radius: 8px; }
    .btn-dark:hover { background: #ea580c; }

    .spinner-border { color: var(--cor-laranja); }
</style>
</head>
<body>

<div class="container-app">
    <div class="logo-header">
        <img src="logo.png" alt="Logo">
    </div>

    <div class="mb-2">
        <input type="text" id="filtroNome" class="form-control mb-2" placeholder="Buscar..." onkeyup="aplicarFiltro()">
        <select id="filtroStatus" class="form-select" onchange="aplicarFiltro()">
            <option value="">Todas as situações</option>
            <option value="Evangélico">Evangélico</option>
            <option value="Não Evangélico">Não Evangélico</option>
            <option value="Afastado(a)">Afastado(a)</option>
            <option value="Sem congregação">Sem congregação</option>
        </select>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <small class="fw-bold">Total: <span id="contador">0</span></small>
        <button onclick="buscarDados()" class="btn btn-dark btn-sm">Atualizar</button>
    </div>

    <div id="loading" class="text-center mt-3"><div class="spinner-border"></div></div>
    <div id="listaVisitantes"></div>
</div>

<div class="modal fade" id="detalhesModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-3">
            <h5 id="detNome" class="fw-bold text-center mb-3" style="color: var(--cor-laranja);"></h5>
            <div class="info-box"><b>Telefone:</b> <span id="detTel"></span></div>
            <div class="info-box"><b>Situação:</b> <span id="detStatus"></span></div>
            <div class="info-box"><b>Convidado:</b> <span id="detOutro"></span></div>
            <div class="info-box"><b>Mensagem:</b> <span id="detMsg"></span></div>
            <div class="info-box"><b>Data:</b> <span id="detData"></span></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // [SUA LÓGICA PERMANECE A MESMA]
    const API_URL = "https://script.google.com/macros/s/AKfycbyrx7uJhNfLnoERD5qLNNwKu2QAmGQVpFNFqJoOIHpygafv7LVmJlL9ZQWzpvI9KCX0/exec";
    let dadosLocais = [], dadosFiltrados = [];
    const modal = new bootstrap.Modal(document.getElementById('detalhesModal'));

    async function buscarDados() {
        document.getElementById('loading').style.display = 'block';
        try {
            const r = await fetch(API_URL, { redirect: 'follow' });
            dadosLocais = (await r.json()).reverse();
            dadosFiltrados = dadosLocais;
            renderLista();
        } catch(e) { console.error(e); }
        document.getElementById('loading').style.display = 'none';
    }

    function renderLista() {
        let lista = document.getElementById('listaVisitantes');
        lista.innerHTML = "";
        document.getElementById('contador').innerText = dadosFiltrados.length;
        dadosFiltrados.forEach((item, index) => {
            let card = document.createElement("div");
            card.className = "visitor-card";
            card.onclick = () => verDetalhes(index);
            card.innerHTML = `<div class="card-nome">${item.nome}</div><small>${item.telefone || '---'}</small>`;
            lista.appendChild(card);
        });
    }

    function aplicarFiltro() {
        let n = document.getElementById('filtroNome').value.toLowerCase();
        let sF = document.getElementById('filtroStatus').value;
        dadosFiltrados = dadosLocais.filter(i => {
            let s = (i.evangelico || "").toLowerCase();
            let c = s === "sim" ? "Evangélico" : (s.includes("nao") ? "Não Evangélico" : (s.includes("afastado") ? "Afastado(a)" : "Sem congregação"));
            return i.nome.toLowerCase().includes(n) && (!sF || c === sF);
        });
        renderLista();
    }

    function verDetalhes(idx) {
        let d = dadosFiltrados[idx];
        document.getElementById('detNome').innerText = d.nome;
        document.getElementById('detTel').innerText = d.telefone || '---';
        document.getElementById('detStatus').innerText = d.evangelico || '---';
        document.getElementById('detOutro').innerText = d.outro || '---';
        document.getElementById('detMsg').innerText = d.mensagem || '---';
        document.getElementById('detData').innerText = d.data || '---';
        modal.show();
    }

    window.onload = buscarDados;
</script>
</body>
</html>
